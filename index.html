<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Генератор идей</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="card">
        <h1>
            🤖 AI Генератор
            <span>OpenRouter</span>
        </h1>
        <div class="subtitle">
            Ответы от нейросети через OpenRouter API
        </div>

        <div id="aiOutput" class="output-field">✨ Нажмите кнопку «Сгенерировать идею» — нейросеть придумает уникальную концепцию
        </div>

        <button id="generateBtn" class="generate-btn">
            <span></span> Сгенерировать идею
        </button>
        
        <button id="clearBtn" class="clear-btn">
            Очистить поле
        </button>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
            <div id="statusBadge" class="status-badge">
                Ожидание
            </div>
            <div style="font-size: 0.85rem; color: #574b0f; margin-top: 1rem;">
                Модель: arcee-ai
            </div>
        </div>

        
    </div>

    <script src="index.js"></script>
</body>
</html>
